name: A-SOUL 自动应援

on:
  schedule:
    # 每 2 天执行一次，UTC 02:30 = 北京时间 10:30
    - cron: '30 2 */2 * *'
  workflow_dispatch:

# ═══════════════════════════════════════════
# 🔧 配置区（按需修改 true / false）
# ═══════════════════════════════════════════
env:
  # 视频点赞（给最近几天的新视频点赞），默认开启
  ENABLE_VIDEO_LIKE: 'true'

  # 动态点赞（给最近几天的动态点赞），默认关闭
  ENABLE_DYNAMIC_LIKE: 'false'

  # 视频/动态的时间范围（天），与执行频率对齐
  DAYS: '3'

  # 操作之间的间隔（秒），防止请求过快被 ban
  # 建议 5~15，默认 8 秒
  DELAY_SECONDS: '8'

jobs:
  support:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 👍 视频点赞
        if: env.ENABLE_VIDEO_LIKE == 'true'
        env:
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
        run: |
          python3 scripts/videos.py --days "$DAYS" --sessdata "$SESSDATA" --bili-jct "$BILI_JCT" --delay "$DELAY_SECONDS"

      - name: 💬 动态点赞
        if: env.ENABLE_DYNAMIC_LIKE == 'true'
        env:
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
        run: |
          python3 scripts/dynamics.py --days "$DAYS" --sessdata "$SESSDATA" --bili-jct "$BILI_JCT" --delay "$DELAY_SECONDS"
