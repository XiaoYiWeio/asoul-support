name: A-SOUL 每日应援

on:
  schedule:
    # UTC 02:30 = 北京时间 10:30
    - cron: '30 2 * * *'
  workflow_dispatch:

# ═══════════════════════════════════════════
# 🔧 配置区（按需修改 true / false）
# ═══════════════════════════════════════════
env:
  # 粉丝牌点亮（自动佩戴粉丝牌 + 发 10 条弹幕点亮牌子），默认开启
  ENABLE_CHECKIN: 'true'

  # 视频点赞（给最近7天的新视频点赞），默认关闭
  ENABLE_VIDEO_LIKE: 'false'

  # 动态点赞（给最近7天的动态点赞），默认关闭
  ENABLE_DYNAMIC_LIKE: 'false'

  # 每个直播间发送的弹幕条数，发满 10 条可点亮牌子 3 天
  CHECKIN_COUNT: '10'

  # 同一直播间内弹幕之间的间隔（秒），防止"发送太频繁"
  DANMAKU_DELAY: '3'

  # 成员之间的间隔（秒），防止请求过快被 ban
  # 建议 5~15，默认 8 秒
  DELAY_SECONDS: '8'

jobs:
  support:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🏅 粉丝牌点亮（佩戴牌子 + 发弹幕点亮）
        if: env.ENABLE_CHECKIN == 'true'
        env:
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
        run: |
          python3 scripts/checkin.py --sessdata "$SESSDATA" --bili-jct "$BILI_JCT" --count "$CHECKIN_COUNT" --danmaku-delay "$DANMAKU_DELAY" --delay "$DELAY_SECONDS"

      - name: 👍 视频点赞（最近7天）
        if: env.ENABLE_VIDEO_LIKE == 'true'
        env:
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
        run: |
          python3 scripts/videos.py --days 7 --sessdata "$SESSDATA" --bili-jct "$BILI_JCT" --delay "$DELAY_SECONDS"

      - name: 💬 动态点赞（最近7天）
        if: env.ENABLE_DYNAMIC_LIKE == 'true'
        env:
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
        run: |
          python3 scripts/dynamics.py --days 7 --sessdata "$SESSDATA" --bili-jct "$BILI_JCT" --delay "$DELAY_SECONDS"
